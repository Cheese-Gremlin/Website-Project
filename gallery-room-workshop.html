<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Room — Anouk's Castle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="gallery-styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     ROOM PAGE
     Change ROOM_ID below to match the key in gallery-data.js
═══════════════════════════════════════════════════════════ -->
<script>
  // ↓ Change this to match your room's key in gallery-data.js ↓
  const ROOM_ID = "workshop";
</script>

<div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
  <button class="lightbox__close" id="lightboxClose" aria-label="Close">✕</button>
  <div class="lightbox__inner">
    <div class="lightbox__frame-border">
      <img class="lightbox__img" id="lightboxImg" src="" alt="">
    </div>
    <div class="lightbox__info">
      <h2 class="lightbox__name" id="lightboxName"></h2>
      <p class="lightbox__desc" id="lightboxDesc"></p>
    </div>
  </div>
</div>

<div class="corridor-wrap" id="corridorWrap">
  <div class="corridor" id="corridor"></div>
</div>

<div class="corridor__entrance" id="entrancePanel">
  <div class="corridor__entrance-text">
    <h1 id="galleryTitle" class="corridor__title"></h1>
    <p  id="gallerySubtitle" class="corridor__subtitle"></p>
    <p class="corridor__hint">↓ Scroll to explore the room</p>
  </div>
</div>

<div class="corridor__end-overlay">
  <p class="corridor__end-text">~ End of the Room ~</p>
</div>

<div class="walk-progress"></div>

<script src="gallery-data.js"></script>
<script src="gallery-engine.js"></script>
<script src="script.js"></script>

</body>
</html>
